version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: buymarjet-postgres
    environment:
      POSTGRES_USER: buymarjet
      POSTGRES_PASSWORD: buymarjet123
      POSTGRES_DB: buymarjet
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - buymarjet-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U buymarjet"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: buymarjet-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - buymarjet-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: buymarjet-backend
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://buymarjet:buymarjet123@postgres:5432/buymarjet
      REDIS_URL: redis://redis:6379
      JWT_SECRET: dev_jwt_secret_key_change_in_production
      PORT: 5000
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - buymarjet-network
    command: npm run dev

  # Frontend App
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: buymarjet-frontend
    environment:
      VITE_API_BASE_URL: http://localhost:5000/api
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - buymarjet-network
    command: npm run dev

volumes:
  postgres_data:
  redis_data:

networks:
  buymarjet-network:
    driver: bridge
